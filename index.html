<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>文档小助手</title>
  <link rel="stylesheet" href="style.css">
  <script src="lib/jszip.min.js"></script>
  <script src="lib/pako.min.js"></script>
  <script src="lib/7zz.umd.js"></script>
  <script src="lib/page-flip.browser.js"></script>
</head>
<body>
<div class="app-shell">

  <!-- ===== HEADER ===== -->
  <header class="app-header" id="appHeader">
    <div class="header-left">
      <button class="header-back" id="headerBack" onclick="goBack()">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
      </button>
      <div>
        <div class="header-title" id="headerTitle" data-i18n="myFiles">我的文件</div>
        <div class="header-subtitle" id="headerSubtitle"></div>
      </div>
    </div>
    <div class="header-right">
      <div class="admin-badge" id="adminBadge">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.57-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/></svg>
        <span data-i18n="adminMode">管理员</span>
      </div>
      <button class="hdr-btn" id="feedbackBtn" onclick="openFeedback()" title="反馈与帮助">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9 5.25h.008v.008H12v-.008z"/></svg>
      </button>
      <button class="hdr-btn" id="multiSelectBtn" onclick="toggleMultiSelect()" title="多选">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      </button>
      <button class="hdr-btn" id="fabUpload" onclick="triggerUpload()" title="上传文件">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 16.5V9.75m0 0l3 3m-3-3l-3 3M6.75 19.5a4.5 4.5 0 01-1.41-8.775 5.25 5.25 0 0110.233-2.33 3 3 0 013.758 3.848A3.752 3.752 0 0118 19.5H6.75z"/></svg>
      </button>
      <button class="hdr-btn" id="settingsBtn" onclick="openSettings()" title="设置">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.43l-1.003.828c-.293.241-.438.613-.43.992a7.723 7.723 0 010 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.43l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.991l-1.004-.827a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.645-.869l.214-1.28z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      </button>
      <button class="hdr-btn" id="langBtn" onclick="toggleLang()">
        <span id="langLabel">EN</span>
      </button>
      <button class="hdr-btn" id="logoutAdminBtn" style="display:none" onclick="logoutAdmin()" title="退出管理员">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9"/></svg>
      </button>
    </div>
  </header>

  <!-- ===== SEARCH BAR ===== -->
  <div class="search-bar-wrap" id="searchBarWrap">
    <div class="search-bar">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/></svg>
      <input type="text" id="searchInput" data-i18n-placeholder="searchPlaceholder" placeholder="搜索文件...">
    </div>
  </div>

  <!-- ===== CATEGORY TABS ===== -->
  <div class="category-tabs" id="categoryTabs">
    <button class="cat-tab active" data-cat="all" onclick="filterCategory('all')">
      <div class="cat-tab-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25a2.25 2.25 0 01-2.25-2.25v-2.25z"/></svg></div>
      <span class="cat-tab-label" data-i18n="catAll">全部</span>
      <span class="cat-tab-count" id="countAll">0</span>
    </button>
    <button class="cat-tab" data-cat="doc" onclick="filterCategory('doc')">
      <div class="cat-tab-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg></div>
      <span class="cat-tab-label" data-i18n="catDoc">文档</span>
      <span class="cat-tab-count" id="countDoc">0</span>
    </button>
    <button class="cat-tab" data-cat="image" onclick="filterCategory('image')">
      <div class="cat-tab-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="m2.25 15.75 5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5 1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909M3.75 21h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5z"/></svg></div>
      <span class="cat-tab-label" data-i18n="catImage">图片</span>
      <span class="cat-tab-count" id="countImage">0</span>
    </button>
    <button class="cat-tab" data-cat="comic" onclick="filterCategory('comic')">
      <div class="cat-tab-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"/></svg></div>
      <span class="cat-tab-label" data-i18n="catComic">漫画</span>
      <span class="cat-tab-count" id="countComic">0</span>
    </button>
    <button class="cat-tab" data-cat="other" onclick="filterCategory('other')">
      <div class="cat-tab-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 014.5 9.75h15A2.25 2.25 0 0121.75 12v.75m-8.69-6.44l-2.12-2.12a1.5 1.5 0 00-1.061-.44H4.5A2.25 2.25 0 002.25 6v12a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9a2.25 2.25 0 00-2.25-2.25h-5.379a1.5 1.5 0 01-1.06-.44z"/></svg></div>
      <span class="cat-tab-label" data-i18n="catOther">其他</span>
      <span class="cat-tab-count" id="countOther">0</span>
    </button>
  </div>

  <!-- ===== MULTI-SELECT BAR ===== -->
  <div class="multi-select-bar" id="multiSelectBar" style="display:none">
    <span class="ms-info">已选 <span id="multiSelectCount">0</span> 项</span>
    <div class="ms-actions">
      <button class="ms-btn" onclick="moveSelected()">移动</button>
      <button class="ms-btn danger" onclick="deleteSelected()">删除</button>
      <button class="ms-btn primary" onclick="compressSelected()">压缩</button>
      <button class="ms-btn" onclick="toggleMultiSelect()">取消</button>
    </div>
  </div>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main-content" id="mainContent">

    <!-- VIEW: FILE LIST (Normal + Admin) -->
    <div id="viewFiles" class="view active">
      <div class="file-section-title" id="fileSectionTitle">
        <span data-i18n="recentFiles">最近文件</span>
      </div>
      <div class="file-list" id="fileListArea"></div>
    </div>

    <!-- VIEW: FEEDBACK (Disguised entry) -->
    <div id="viewFeedback" class="view">
      <div class="feedback-view">
        <div class="feedback-card">
          <div class="feedback-head">
            <div class="feedback-head-icon">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972 0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z"/></svg>
            </div>
            <div class="feedback-head-text">
              <h3 data-i18n="feedbackTitle">问题反馈</h3>
              <p data-i18n="feedbackDesc">请描述您遇到的问题，我们会尽快处理</p>
            </div>
          </div>
          <form id="feedbackForm">
            <div class="fb-group">
              <label class="fb-label" data-i18n="labelDesc">反馈内容</label>
              <textarea class="fb-textarea" id="fbContent" required data-i18n-placeholder="phDesc" placeholder="请详细描述您遇到的问题或改进建议..."></textarea>
            </div>
            <div style="height:14px"></div>
            <button type="submit" class="fb-submit-btn">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/></svg>
              <span data-i18n="submitFeedback">提交反馈</span>
            </button>
          </form>
      </div>
    </div>

    <!-- Hidden File Input for Uploads -->
    <input type="file" id="fileInput" class="hidden-input">

  </main>
  <!-- ===== COMPRESS FAB (visible in multi-select mode) ===== -->
  <button class="fab-upload fab-compress" id="fabCompress" onclick="compressSelected()" title="压缩为 zip" style="display:none">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"/></svg>
  </button>

</div>

<!-- ===== GESTURE OVERLAY ===== -->
<div class="gesture-overlay" id="gestureOverlay">
  <div class="gesture-box">
    <div class="gesture-lock-icon">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/></svg>
    </div>
    <div class="gesture-title" id="gTitle" data-i18n="gestureVerify">验证管理员手势</div>
    <div class="gesture-hint" id="gHint" data-i18n="gestureHintDraw">请绘制手势密码</div>
    <div class="gesture-canvas-area">
      <canvas id="gestureCanvas" width="260" height="260"></canvas>
    </div>
    <div class="dot-indicator" id="dotIndicator"></div>
    <div class="gesture-btns">
      <button class="g-btn g-btn-outline" onclick="resetGestureData()" data-i18n="btnReset">重置</button>
      <button class="g-btn g-btn-outline" onclick="closeGesture()" data-i18n="btnCancel">取消</button>
    </div>
    <div class="gesture-forgot" onclick="forgetGesture()" data-i18n="forgotGesture">忘记密码？</div>
  </div>
</div>

<!-- ===== STORAGE CHOICE DIALOG ===== -->
<div class="choice-dialog" id="choiceDialog">
  <div class="choice-card">
    <h3 data-i18n="storageChoice">存储方式</h3>
    <p data-i18n="storageChoiceDesc">选择该文件的存储方式</p>
    <div class="choice-option" onclick="saveFileAs(true)">
      <div class="choice-option-icon private">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/></svg>
      </div>
      <div class="choice-option-text">
        <h4 data-i18n="storePrivate">加密存储</h4>
        <p data-i18n="storePrivateDesc">AES-256加密，仅管理员可见</p>
      </div>
    </div>
    <div class="choice-option" onclick="saveFileAs(false)">
      <div class="choice-option-icon public">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 10.5V6.75a4.5 4.5 0 119 0v3.75M3.75 21.75h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H3.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/></svg>
      </div>
      <div class="choice-option-text">
        <h4 data-i18n="storePublic">公开存储</h4>
        <p data-i18n="storePublicDesc">不加密，所有人可见</p>
      </div>
    </div>
    <button class="choice-cancel" onclick="cancelUpload()" data-i18n="btnCancel">取消</button>
  </div>
</div>

<!-- ===== SETTINGS DIALOG ===== -->
<div class="choice-dialog" id="settingsDialog">
  <div class="choice-card" style="padding-top: 24px; padding-bottom: 24px;">
    <h3 data-i18n="securityTitle">应用安全设置</h3>
    <p data-i18n="securityDesc" style="margin-bottom: 8px;">设置本应用启动与后台返回时的手势密码</p>
    
    <div class="security-group" style="margin: 10px 0; text-align: left;">
      <div class="security-row" style="border-bottom: 1px solid var(--border-subtle); padding-bottom: 12px; margin-bottom: 6px;">
        <span data-i18n="enableLockLabel">启用启动手势锁</span>
        <label class="switch">
          <input type="checkbox" id="enableStartupLockToggle" onchange="toggleStartupLock(this)">
          <span class="slider round"></span>
        </label>
      </div>
      
      <button type="button" class="fb-submit-btn" id="setNormalLockBtn" onclick="setupNormalGesture()" style="background: rgba(255,255,255,0.05); border: 1px solid var(--border-default); color: var(--text-primary); box-shadow: none; display: none; margin-top: 8px; width: 100%;">
        <span data-i18n="btnSetNormalLock">设置/修改手势密码</span>
      </button>
    </div>
    
    <button class="choice-cancel" onclick="closeSettings()" data-i18n="btnClose" style="margin-top: 4px;">关闭</button>
  </div>
</div>

<!-- ===== PREVIEW MODAL ===== -->
<div class="preview-modal" id="previewModal">
  <div class="preview-card">
    <div class="preview-top">
      <div class="preview-top-title" id="pvTitle">文件名</div>
      <button class="preview-top-close" onclick="closePreview()">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="preview-content" id="pvContent"></div>
    <div class="preview-footer">
      <button class="pv-btn pv-btn-default" onclick="closePreview()">
        <span data-i18n="btnClose">关闭</span>
      </button>
      <button class="pv-btn pv-btn-primary" id="pvDownloadBtn">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
        <span data-i18n="btnDownload">下载</span>
      </button>
    </div>
  </div>
</div>

<!-- ===== COMIC READER ===== -->
<div class="reader-overlay" id="readerOverlay">
  <div class="reader-top" id="readerTop">
    <button class="reader-back-btn" onclick="closeReader()">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
      <span data-i18n="readerBack">返回</span>
    </button>
    <span class="reader-page-indicator" id="readerPageIndicator">01/01</span>
    <span class="reader-file-name" id="readerFileName"></span>
    <button class="reader-menu-btn" onclick="toggleControls()" title="工具栏">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg>
    </button>
  </div>

  <!-- Sidebar backdrop (tap outside to close) -->
  <div class="reader-sidebar-backdrop" id="readerSidebarBackdrop" onclick="closeSidebar()"></div>

  <!-- Chapter Drawer (bottom thumbnail grid) -->
  <div class="reader-sidebar" id="readerSidebar">
    <div class="sidebar-header">
      <h3 data-i18n="chapterList">目录</h3>
      <button class="sidebar-close" onclick="closeSidebar()">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="sidebar-grid" id="sidebarList"></div>
  </div>

  <div class="reader-canvas" id="readerCanvas"></div>

  <!-- Reader Controls -->
  <div class="reader-controls" id="readerControls">
    <div class="ctrl-row ctrl-fan-row">
      <button class="pf-arrow" onclick="pageFanStep(-1)" title="上一页">‹</button>
      <div class="page-fan" id="pageFan"></div>
      <button class="pf-arrow" onclick="pageFanStep(1)" title="下一页">›</button>
    </div>
    <div class="ctrl-row">
      <button class="ctrl-btn" onclick="toggleSidebar()" title="目录">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25H12"/></svg>
        <span data-i18n="btnChapter">目录</span>
      </button>
      <select class="ctrl-select" id="rModeSelect">
        <option value="click" data-i18n="modeClick">左右翻页</option>
        <option value="flip" data-i18n="modeFlip">仿真翻页</option>
        <option value="slide" data-i18n="modeSlide">上下翻页</option>
        <option value="webtoon" data-i18n="modeWebtoon">瀑布模式</option>
      </select>
      <button class="ctrl-btn" id="rAutoBtn" onclick="toggleAutoPlay()">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 010 1.972l-11.54 6.347a1.125 1.125 0 01-1.667-.986V5.653z"/></svg>
        <span data-i18n="autoPlay">自动翻页</span>
      </button>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label" data-i18n="interval">间隔</span>
      <input type="range" class="ctrl-slider" id="rSpeedSlider" min="1" max="20" value="3">
      <span class="ctrl-label" style="min-width:40px;text-align:right"><span id="rSpeedVal">3</span>s</span>
    </div>
  </div>
</div>

<!-- ===== FILE ACTION MENU ===== -->
<div class="action-menu" id="actionMenu" onclick="closeActionMenu()">
  <div class="action-menu-content" onclick="event.stopPropagation()">
    <button class="action-menu-item" data-act="rename" onclick="handleActionClick('rename')">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125"/></svg>
      <span>重命名</span>
    </button>
    <button class="action-menu-item" data-act="move" onclick="handleActionClick('move')">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 7.5h6.75m0 0l-2.25-2.25M15 7.5l-2.25 2.25M15.75 16.5H9m0 0l2.25 2.25M9 16.5l2.25-2.25M3.75 6A2.25 2.25 0 016 3.75h3.879a1.5 1.5 0 011.06.44l1.621 1.62a1.5 1.5 0 001.061.44H18A2.25 2.25 0 0120.25 8.5v9.25A2.25 2.25 0 0118 20H6a2.25 2.25 0 01-2.25-2.25V6z"/></svg>
      <span>移动到...</span>
    </button>
    <button class="action-menu-item" data-act="extract" onclick="handleActionClick('extract')">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 9.776c.112-.017.227-.026.344-.026h15.812c.117 0 .232.009.344.026m-16.5 0a2.25 2.25 0 00-1.883 2.542l.857 6a2.25 2.25 0 002.227 1.932H19.05a2.25 2.25 0 002.227-1.932l.857-6a2.25 2.25 0 00-1.883-2.542m-16.5 0V6A2.25 2.25 0 016 3.75h3.879a1.5 1.5 0 011.06.44l2.122 2.12a1.5 1.5 0 001.06.44H18A2.25 2.25 0 0120.25 9v.776"/></svg>
      <span>解压</span>
    </button>
    <button class="action-menu-item" data-act="moveToPrivate" onclick="handleActionClick('moveToPrivate')" style="display:none">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/></svg>
      <span>移入私密空间</span>
    </button>
    <button class="action-menu-item" data-act="moveToPublic" onclick="handleActionClick('moveToPublic')" style="display:none">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 10.5V6.75a4.5 4.5 0 119 0v3.75M3.75 21.75h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H3.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/></svg>
      <span>设为公开</span>
    </button>
    <button class="action-menu-item danger" data-act="delete" onclick="handleActionClick('delete')">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"/></svg>
      <span>删除</span>
    </button>
    <button class="action-menu-item action-menu-cancel" onclick="closeActionMenu()">
      <span>取消</span>
    </button>
  </div>
</div>

<!-- ===== MOVE FILE DIALOG ===== -->
<div class="choice-dialog" id="moveDialog">
  <div class="choice-card">
    <h3>移动到文件夹</h3>
    <p>选择目标文件夹，也可以输入新文件夹名称</p>
    <div class="move-folder-list" id="moveFolderList"></div>
    <div class="move-new-folder">
      <input type="text" id="moveNewFolderInput" class="rename-input" placeholder="新文件夹名称">
      <button class="rename-confirm" onclick="confirmMoveToNewFolder()">移动到新文件夹</button>
    </div>
    <button class="choice-cancel" onclick="closeMoveDialog()">取消</button>
  </div>
</div>

<!-- ===== COMPRESS FORMAT PICKER ===== -->
<div class="choice-dialog" id="formatDialog">
  <div class="choice-card">
    <h3>选择压缩格式</h3>
    <p>所选文件将被打包为下列格式之一</p>
    <div class="choice-option" onclick="compressAs('zip')">
      <div class="choice-option-icon public">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 9.776c.112-.017.227-.026.344-.026h15.812c.117 0 .232.009.344.026m-16.5 0a2.25 2.25 0 00-1.883 2.542l.857 6a2.25 2.25 0 002.227 1.932H19.05a2.25 2.25 0 002.227-1.932l.857-6a2.25 2.25 0 00-1.883-2.542m-16.5 0V6A2.25 2.25 0 016 3.75h3.879a1.5 1.5 0 011.06.44l2.122 2.12a1.5 1.5 0 001.06.44H18A2.25 2.25 0 0120.25 9v.776"/></svg>
      </div>
      <div class="choice-option-text">
        <h4>ZIP</h4>
        <p>通用兼容性最好</p>
      </div>
    </div>
    <div class="choice-option" onclick="compressAs('7z')">
      <div class="choice-option-icon private">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 9.776c.112-.017.227-.026.344-.026h15.812c.117 0 .232.009.344.026m-16.5 0a2.25 2.25 0 00-1.883 2.542l.857 6a2.25 2.25 0 002.227 1.932H19.05a2.25 2.25 0 002.227-1.932l.857-6a2.25 2.25 0 00-1.883-2.542"/></svg>
      </div>
      <div class="choice-option-text">
        <h4>7Z</h4>
        <p>压缩率更高，需要 7zip 类工具解压</p>
      </div>
    </div>
    <div class="choice-option" onclick="compressAs('tar')">
      <div class="choice-option-icon" style="background:rgba(245,158,11,0.15);color:var(--accent-orange);">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z"/></svg>
      </div>
      <div class="choice-option-text">
        <h4>TAR</h4>
        <p>无压缩，仅打包</p>
      </div>
    </div>
    <button class="choice-cancel" onclick="closeFormatDialog()">取消</button>
  </div>
</div>

<!-- ===== RENAME DIALOG ===== -->
<div class="choice-dialog" id="renameDialog">
  <div class="choice-card">
    <h3>重命名</h3>
    <input type="text" id="renameInput" class="rename-input" placeholder="输入新名称">
    <div class="rename-btns">
      <button class="choice-cancel" onclick="closeRename()">取消</button>
      <button class="rename-confirm" onclick="confirmRename()">确定</button>
    </div>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<!-- ===== SCRIPTS ===== -->
<script src="app.js"></script>
<script src="reader.js"></script>
</body>
</html>
