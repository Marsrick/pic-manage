name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: npm run build

      - name: Add and Sync iOS Platform
        run: |
          npx cap add ios
          npx cap sync ios

      - name: Patch Info.plist (register file associations)
        run: |
          # Strip CRLF in case the script was committed with Windows line endings
          sed -i.bak 's/\r$//' scripts/patch-ios-plist.sh && rm -f scripts/patch-ios-plist.sh.bak
          chmod +x scripts/patch-ios-plist.sh
          bash scripts/patch-ios-plist.sh

      - name: Build Xcode project
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -sdk iphoneos \
                     -configuration Release \
                     archive -archivePath build/App.xcarchive \
                     CODE_SIGNING_ALLOWED=NO

      - name: Export IPA (Unsigned)
        run: |
          mkdir -p build/Payload
          cp -r build/App.xcarchive/Products/Applications/App.app build/Payload/
          cd build
          zip -r PicManage-unsigned.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PicManage-unsigned-ipa
          path: build/PicManage-unsigned.ipa
